# =============================================================================
# JENEUS HelpDesk — Docker Compose
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Application (Express API + Vite SPA served via static files)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jeneus-app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:4000}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM:-noreply@jeneus.com}
      - S3_BUCKET=${S3_BUCKET:-jeneus-uploads}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_ENDPOINT=${S3_ENDPOINT}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - jeneus-network

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: jeneus-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jeneus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jeneus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-jeneus_helpdesk}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jeneus} -d ${POSTGRES_DB:-jeneus_helpdesk}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - jeneus-network

  # ---------------------------------------------------------------------------
  # Redis (BullMQ job queue, session cache, Socket.IO adapter)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jeneus-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - jeneus-network

volumes:
  pgdata:
    name: jeneus-pgdata
  redisdata:
    name: jeneus-redisdata

networks:
  jeneus-network:
    name: jeneus-network
